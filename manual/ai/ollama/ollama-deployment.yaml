kind: Deployment
apiVersion: apps/v1
metadata:
  name: ollama-00001-deployment
  namespace: ollama-demo
  labels:
    app: ollama-00001
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-00001
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: ollama-00001
    spec:
      restartPolicy: Always
      schedulerName: default-scheduler
      enableServiceLinks: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    serving.knative.dev/revision: ollama-00001
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 300
      securityContext: {}
      containers:
        - resources: {}
          terminationMessagePath: /dev/termination-log
          lifecycle:
            preStop:
              httpGet:
                path: /wait-for-drain
                port: 8022
                scheme: HTTP
          name: ollama
          env:
            - name: PORT
              value: '8080'
            - name: K_REVISION
              value: ollama-00001
            - name: K_CONFIGURATION
              value: ollama
            - name: K_SERVICE
              value: ollama
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: user-port
              containerPort: 8080
              protocol: TCP
          imagePullPolicy: Always
          volumeMounts:
            - name: ollama
              mountPath: /.ollama
          terminationMessagePolicy: FallbackToLogsOnError
          image: 'docker.io/ollama/ollama:latest'
        - resources:
            requests:
              cpu: 25m
          readinessProbe:
            httpGet:
              path: /
              port: 8012
              scheme: HTTP
              httpHeaders:
                - name: K-Network-Probe
                  value: queue
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          name: queue-proxy
          env:
            - name: SERVING_NAMESPACE
              value: anotrher-demo
            - name: SERVING_SERVICE
              value: ollama
            - name: SERVING_CONFIGURATION
              value: ollama
            - name: SERVING_REVISION
              value: ollama-00001
            - name: QUEUE_SERVING_PORT
              value: '8012'
            - name: QUEUE_SERVING_TLS_PORT
              value: '8112'
            - name: CONTAINER_CONCURRENCY
              value: '0'
            - name: REVISION_TIMEOUT_SECONDS
              value: '300'
            - name: REVISION_RESPONSE_START_TIMEOUT_SECONDS
              value: '0'
            - name: REVISION_IDLE_TIMEOUT_SECONDS
              value: '0'
            - name: SERVING_POD
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: SERVING_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: SERVING_LOGGING_CONFIG
            - name: SERVING_LOGGING_LEVEL
            - name: SERVING_REQUEST_LOG_TEMPLATE
              value: '{"httpRequest": {"requestMethod": "{{.Request.Method}}", "requestUrl": "{{js .Request.RequestURI}}", "requestSize": "{{.Request.ContentLength}}", "status": {{.Response.Code}}, "responseSize": "{{.Response.Size}}", "userAgent": "{{js .Request.UserAgent}}", "remoteIp": "{{js .Request.RemoteAddr}}", "serverIp": "{{.Revision.PodIP}}", "referer": "{{js .Request.Referer}}", "latency": "{{.Response.Latency}}s", "protocol": "{{.Request.Proto}}"}, "traceId": "{{index .Request.Header "X-B3-Traceid"}}"}'
            - name: SERVING_ENABLE_REQUEST_LOG
              value: 'false'
            - name: SERVING_REQUEST_METRICS_BACKEND
              value: prometheus
            - name: SERVING_REQUEST_METRICS_REPORTING_PERIOD_SECONDS
              value: '5'
            - name: TRACING_CONFIG_BACKEND
              value: none
            - name: TRACING_CONFIG_ZIPKIN_ENDPOINT
            - name: TRACING_CONFIG_DEBUG
              value: 'false'
            - name: TRACING_CONFIG_SAMPLE_RATE
              value: '0.1'
            - name: USER_PORT
              value: '8080'
            - name: SYSTEM_NAMESPACE
              value: knative-serving
            - name: METRICS_DOMAIN
              value: knative.dev/internal/serving
            - name: SERVING_READINESS_PROBE
              value: '{"tcpSocket":{"port":8080,"host":"127.0.0.1"},"successThreshold":1}'
            - name: ENABLE_PROFILING
              value: 'false'
            - name: SERVING_ENABLE_PROBE_REQUEST_LOG
              value: 'false'
            - name: METRICS_COLLECTOR_ADDRESS
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            - name: ENABLE_HTTP2_AUTO_DETECTION
              value: 'false'
            - name: ENABLE_HTTP_FULL_DUPLEX
              value: 'false'
            - name: ROOT_CA
            - name: ENABLE_MULTI_CONTAINER_PROBES
              value: 'false'
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - name: http-queueadm
              containerPort: 8022
              protocol: TCP
            - name: http-autometric
              containerPort: 9090
              protocol: TCP
            - name: http-usermetric
              containerPort: 9091
              protocol: TCP
            - name: queue-port
              containerPort: 8012
              protocol: TCP
            - name: https-port
              containerPort: 8112
              protocol: TCP
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: ollama
              mountPath: /.ollama
          terminationMessagePolicy: File
          image: 'registry.redhat.io/openshift-serverless-1/kn-serving-queue-rhel8@sha256:bd464d68e283ce6c48ae904010991b491b738ada5a419f044bf71fd48326005b'
      volumes:
        - name: ollama
          persistentVolumeClaim:
            claimName: ollama
