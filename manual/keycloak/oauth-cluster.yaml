apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
  - mappingMethod: claim
    name: keycloak
    openID:
#      ca:
#        name: openid-ca  {"data":{}"ca.crt":"...CERT..."}
      claims:
        email:
        - email
        name:
        - name
        preferredUsername:
        - preferred_username
        groups:
        - groups
      clientID: openshift
      clientSecret:
        name: keycloak-client-secret
      issuer: https://keycloak.apps.disc.spenscot.ddns.net/realms/openshift
    type: OpenID