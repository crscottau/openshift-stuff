    - id: ea16ac49-ea93-4c66-a208-1ef092dca2f4
      name: hmac-generated-hs512
      providerId: hmac-generated
      subComponents: {}
      config:
        kid:
          - 02c8cce7-a922-4cb5-bb36-9cb35f433a0b
        secret:
          - vwCvLYnUY72KbCb-rBrcqaZ0YbUkxA1ljNAMieOxjFaHYYrDMVcXHXIUF10IPVFB9kbCnIcNuHOrrcOw6hhGnBkXWOHoUAVGwOyW42OeAC1GxXa_EmmT_RaMKiuj0vZtLZvH17bZVj7jawUYCmd5xGyM4pjciNlPbuBByfiapGY
        priority:
          - "100"
