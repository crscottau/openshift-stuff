apiVersion: ''
kind: KeycloakRealmImport
metadata:
  name: openshift-real-import
  namespace: keycloak
  realm: openshift
roles:
  realm:
    - name: default-roles-openshift
      description: ${role_default-roles}
      composite: true
      composites:
        realm:
          - offline_access
          - uma_authorization
        client:
          account:r
            - view-profile
            - manage-account
      clientRole: false
      attributes: {}
  client:
    openshift: []
groups:
  - name: cluster-admins
    description: OpenShift cluster admins
    path: /cluster-admins
    subGroups: []
    attributes: {}
    realmRoles: []
    clientRoles: {}
  - name: ocp-admins
    description: ""
    path: /ocp-admins
    subGroups: []
    attributes: {}
    realmRoles: []
    clientRoles: {}
  - name: ocp-viewers
    description: View only access
    path: /ocp-viewers
    subGroups: []
    attributes: {}
    realmRoles: []
    clientRoles: {}
requiredCredentials:
  - password
  - clientId: openshift
    name: ""
    description: ""
    rootUrl: ""
    adminUrl: ""
    baseUrl: ""
    surrogateAuthRequired: false
    enabled: true
    alwaysDisplayInConsole: false
    clientAuthenticatorType: client-secret
    redirectUris:
      - https://oauth-openshift.apps.disc.spenscot.ddns.net/oauth2callback/*
    webOrigins:
      - https://oauth-openshift.apps.disc.spenscot.ddns.net
    notBefore: 0
    bearerOnly: false
    consentRequired: false
    standardFlowEnabled: true
    implicitFlowEnabled: false
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: false
    publicClient: false
    frontchannelLogout: true
    protocol: openid-connect
    attributes:
      realm_client: "false"
      oidc.ciba.grant.enabled: "false"
      client.secret.creation.time: "1773373618"
      backchannel.logout.session.required: "true"
      standard.token.exchange.enabled: "false"
      oauth2.device.authorization.grant.enabled: "false"
      backchannel.logout.revoke.offline.tokens: "false"
      dpop.bound.access.tokens: "false"
    authenticationFlowBindingOverrides: {}
    fullScopeAllowed: true
    nodeReRegistrationTimeout: -1
    defaultClientScopes:
      - web-origins
      - acr
      - roles
      - profile
      - basic
      - email
    optionalClientScopes:
      - address
      - phone
      - organization
      - offline_access
      - microprofile-jwt
          introspection.token.claim: "true"
          userinfo.token.claim: "true"
          user.attribute: picture
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: picture
          jsonType.label: String
      - id: d3f75401-0ba5-46e5-beca-c96170742e26
        name: birthdate
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          introspection.token.claim: "true"
          userinfo.token.claim: "true"
          user.attribute: birthdate
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: birthdate
          jsonType.label: String
      - id: b175616d-fde2-41ea-9fa9-034dcf5b067f
        name: middle name
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          introspection.token.claim: "true"
          userinfo.token.claim: "true"
          user.attribute: middleName
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: middle_name
          jsonType.label: String
      - id: 4db85c3e-eead-47df-a510-74f7ce47f562
        name: locale
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          introspection.token.claim: "true"
          userinfo.token.claim: "true"
          user.attribute: locale
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: locale
          jsonType.label: String
      - id: 0da21a68-5ddb-4027-875f-2bab6407ce43
        name: nickname
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          introspection.token.claim: "true"
          userinfo.token.claim: "true"
          user.attribute: nickname
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: nickname
          jsonType.label: String
  - id: 397183ff-fde4-4cee-b30c-ca03d2732f26
    name: organization
    description: Additional claims about the organization a subject belongs to
    protocol: openid-connect
    attributes:
      include.in.token.scope: "true"
      consent.screen.text: ${organizationScopeConsentText}
      display.on.consent.screen: "true"
    protocolMappers:
      - id: 17c342bf-2d8c-44ae-921a-60e4a7532c61
        name: organization
        protocol: openid-connect
        protocolMapper: oidc-organization-membership-mapper
        consentRequired: false
        config:
          id.token.claim: "true"
          introspection.token.claim: "true"
          access.token.claim: "true"
          claim.name: organization
          jsonType.label: String
          multivalued: "true"
  - id: 01252fdf-61c4-43b8-903c-4f0b33d2987e
    name: role_list
    description: SAML role list
    protocol: saml
    attributes:
      consent.screen.text: ${samlRoleListScopeConsentText}
      display.on.consent.screen: "true"
    protocolMappers:
      - id: 4106debc-50b8-4ace-81e5-22b1385ef8fc
        name: role list
        protocol: saml
        protocolMapper: saml-role-list-mapper
        consentRequired: false
        config:
          single: "false"
          attribute.nameformat: Basic
          attribute.name: Role
  - id: f9433688-a3b3-4b17-aac6-aa43750d5a13
    name: microprofile-jwt
    description: Microprofile - JWT built-in scope
    protocol: openid-connect
    attributes:
      include.in.token.scope: "true"
      display.on.consent.screen: "false"
    protocolMappers:
      - id: 354f4325-6896-4ee8-b38a-246595080f66
        name: upn
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          introspection.token.claim: "true"
          userinfo.token.claim: "true"
          user.attribute: username
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: upn
          jsonType.label: String
      - id: 98dffd51-68fd-4741-8f32-887c2f0d1938
        name: groups
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        consentRequired: false
        config:
          introspection.token.claim: "true"
          multivalued: "true"
          user.attribute: foo
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: groups
          jsonType.label: String
  - id: 15bc0e66-f743-4ec0-9bcc-e4744fcd8353
    name: offline_access
    description: 'OpenID Connect built-in scope: offline_access'
    protocol: openid-connect
    attributes:
      consent.screen.text: ${offlineAccessScopeConsentText}
      display.on.consent.screen: "true"
defaultDefaultClientScopes:
  - role_list
  - saml_organization
  - profile
  - email
  - roles
  - web-origins
  - acr
  - basic
defaultOptionalClientScopes:
  - offline_access
  - address
  - phone
  - microprofile-jwt
  - organization
browserSecurityHeaders:
  contentSecurityPolicyReportOnly: ""
  xContentTypeOptions: nosniff
  referrerPolicy: no-referrer
  xRobotsTag: none
  xFrameOptions: SAMEORIGIN
  contentSecurityPolicy: frame-src 'self'; frame-ancestors 'self'; object-src 'none';
  strictTransportSecurity: max-age=31536000; includeSubDomains
smtpServer: {}
eventsEnabled: false
eventsListeners:
  - jboss-logging
enabledEventTypes: []
adminEventsEnabled: false
adminEventsDetailsEnabled: false
identityProviders: []
identityProviderMappers: []
components:
  org.keycloak.services.clientregistration.policy.ClientRegistrationPolicy:
    - id: ecbc2fc0-c42d-442d-8476-41198d3374b5
      name: Allowed Client Scopes
      providerId: allowed-client-templates
      subType: anonymous
      subComponents: {}
      config:
        allow-default-scopes:
          - "true"
    - id: 73717267-69af-4408-9c6a-1ecbc148df6c
      name: Allowed Protocol Mapper Types
      providerId: allowed-protocol-mappers
      subType: anonymous
      subComponents: {}
      config:
        allowed-protocol-mapper-types:
          - oidc-usermodel-property-mapper
          - oidc-usermodel-attribute-mapper
          - oidc-sha256-pairwise-sub-mapper
          - saml-role-list-mapper
          - saml-user-attribute-mapper
          - saml-user-property-mapper
          - oidc-address-mapper
          - oidc-full-name-mapper
    - id: 75afec81-f70d-47f5-a04b-51c1283c3071
      name: Max Clients Limit
      providerId: max-clients
      subType: anonymous
      subComponents: {}
      config:
        max-clients:
          - "200"
    - id: ec42bca7-4243-4812-998b-ce27dbed3347
      name: Full Scope Disabled
      providerId: scope
      subType: anonymous
      subComponents: {}
      config: {}
    - id: 332d4141-cdc3-43bd-bd65-2f3bf3bced82
      name: Consent Required
      providerId: consent-required
      subType: anonymous
      subComponents: {}
      config: {}
    - id: ab7647a3-15dd-4972-807d-f17aff9a657a
      name: Allowed Client Scopes
      providerId: allowed-client-templates
      subType: authenticated
      subComponents: {}
      config:
        allow-default-scopes:
          - "true"
    - id: 07ee3c01-5299-482c-b91a-a1a086bd8bcf
      name: Allowed Protocol Mapper Types
      providerId: allowed-protocol-mappers
      subType: authenticated
      subComponents: {}
      config:
        allowed-protocol-mapper-types:
          - saml-user-attribute-mapper
          - oidc-sha256-pairwise-sub-mapper
          - saml-role-list-mapper
          - oidc-usermodel-attribute-mapper
          - oidc-usermodel-property-mapper
          - oidc-address-mapper
          - oidc-full-name-mapper
          - saml-user-property-mapper
    - id: fe77164d-820e-41c9-8853-cc546432e4fd
      name: Trusted Hosts
      providerId: trusted-hosts
      subType: anonymous
      subComponents: {}
      config:
        host-sending-registration-request-must-match:
          - "true"
        client-uris-must-match:
          - "true"
  org.keycloak.keys.KeyProvider:
    - id: 14a730ef-26bd-4d90-80b0-fb0bed9f6752
      name: rsa-enc-generated
      providerId: rsa-enc-generated
      subComponents: {}
      config:
        privateKey:
          - 
