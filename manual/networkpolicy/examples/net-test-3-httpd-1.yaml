apiVersion: v1
kind: ConfigMap
metadata:
  name: htmlstuff-app-1
  namespace: net-test-3
data:
  index.html: |
    Hello from net-test-3 app-1
---    
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: httpd-app-1
    type: workload
  name: httpd-app-1
  namespace: net-test-3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: httpd-app-1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: httpd-app-1
        type: workload
    spec:
      containers:
      - image: harbor.afp.le/openshift/ubi10/httpd-24:10.1-1778647163
        imagePullPolicy: Always
        name: httpd
        ports:
        - containerPort: 8080
          protocol: TCP
        - containerPort: 8443
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
          - name: htmlstuff
            mountPath: /var/www/html
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - name: htmlstuff
          configMap:
            name: htmlstuff-app-1
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: httpd-app-1
  name: httpd-1
  namespace: net-test-3
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: 8080-tcp
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: 8443-tcp
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app: httpd-app-1
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    app: httpd-app-1
  name: httpd-app-1
  namespace: net-test-3
spec:
  port:
    targetPort: 8080-tcp
  tls:
    termination: edge
  to:
    kind: Service
    name: httpd-1
    weight: 100
  wildcardPolicy: None  